<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-size: 100px;
        color:red;
        text-align: center;
    }
      .parpadeo {
  animation: parpadear 1s infinite;
}

@keyframes parpadear {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}

.mover {
  position: absolute;
  font-size: 100px;
  color: red;
  animation: movimiento 8s linear infinite;
}

@keyframes movimiento {
  0% {
    top: 0;
    left: 0;
  }
  25% {
    top: 0;
    left: calc(100% - 600px); /* Ajusta 600px al ancho aproximado del texto */
  }
  50% {
    top: calc(100% - 120px); /* Ajusta 120px a la altura del texto */
    left: calc(100% - 600px);
  }
  75% {
    top: calc(100% - 120px);
    left: 0;
  }
  100% {
    top: 0;
    left: 0;
  }
}
</style>
<body>
    <script src = "if-else.js"></script>
</body>
</html>
